{% extends "base.html" %}
{% block content %}

<h2>Agregar Libro</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="titulo" placeholder="Título" required>
<br><br>

<input type="text" name="autor" placeholder="Autor" required>
<br><br>

<input type="number" step="0.01" name="precio" placeholder="Precio" required>
<br><br>

<textarea name="descripcion" placeholder="Descripción" required></textarea>
<br><br>

<input type="number" name="stock" placeholder="Stock" required>
<br><br>

<!-- CATEGORÍA -->
<h4>Categoría</h4>

<select name="category_id" required>
<option value="">Seleccionar categoría</option>

{% for category in categories %}
<option value="{{ category.id }}">{{ category.nombre }}</option>
{% endfor %}

</select>

<br><br>

<!-- OFERTA -->
<h4>🔥 Oferta</h4>

<label>
<input type="checkbox" name="oferta">
Este libro está en oferta
</label>

<br><br>

<input type="number" step="0.01" name="precio_oferta" placeholder="Precio de oferta (opcional)">

<br><br>

<!-- IMAGEN URL -->
<h4>Imagen desde internet (URL)</h4>

<input type="text" name="imagen_url" placeholder="https://ejemplo.com/libro.jpg">

<br><br>

<!-- SUBIR IMAGEN -->
<h4>O subir imagen</h4>

<input type="file" name="imagen_file">

<br><br>

<button type="submit">Guardar Libro</button>

</form>

<br>

<a href="/dashboard">⬅ Volver al dashboard</a>

{% endblock %}
