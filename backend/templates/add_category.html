{% extends "base.html" %}
{% block content %}

<h2>Agregar Categoría</h2>

<form method="POST">

    <input 
        type="text" 
        name="nombre" 
        placeholder="Nombre de la categoría"
        required
    >

    <button type="submit">Guardar</button>

</form>

<br><br>

<h3>Categorías existentes</h3>

{% if categories %}

    {% for category in categories %}

    <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:6px;">

        <strong>{{ category.nombre }}</strong>

        <form action="{{ url_for('delete_category', id=category.id) }}" method="POST" style="display:inline;">

            <button 
                type="submit"
                style="color:white; background:red; border:none; padding:5px 10px; margin-left:10px;"
            >
                Eliminar
            </button>

        </form>

    </div>

    {% endfor %}

{% else %}

<p>No hay categorías aún.</p>

{% endif %}

<br>

<a href="/dashboard">⬅ Volver</a>

{% endblock %}
