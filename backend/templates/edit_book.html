{% extends "base.html" %}
{% block content %}

<h2>Editar Libro</h2>

<form method="POST">
    <input type="text" name="titulo" value="{{ book.titulo }}" required><br><br>
    <input type="text" name="autor" value="{{ book.autor }}" required><br><br>
    <input type="number" step="0.01" name="precio" value="{{ book.precio }}" required><br><br>
    <textarea name="descripcion" required>{{ book.descripcion }}</textarea><br><br>
    <input type="number" name="stock" value="{{ book.stock }}" required><br><br>
    <button type="submit">Actualizar</button>
</form>

<br>
<a href="/dashboard">Volver</a>

{% endblock %}
